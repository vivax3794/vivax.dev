<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Viv's blog{% endblock title %}</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="human-json" href="/human.json">
  <meta property="og:site_name" content="Viv's blog">
  {% block head %}{% endblock head %}
</head>

<body>
  <header class="site-header">
    <a href="/">viv's blog</a>
    <nav>
      <a href="https://github.com/vivax3794/vivax.dev">Source Code</a>
      <a href="/ai/">AI Declaration</a>
      <a href="/privacy/">privacy-policy</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock content %}
  </main>
  <footer class="site-footer">
    Blog content &copy; 2026 Viv, licensed under <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/">CC BY-NC-ND 4.0</a>.
  </footer>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true });
  </script>
</body>

</html>
