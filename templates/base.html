<!DOCTYPE html>
<html lang="en">

<head>
  <script>
    (function() {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      } catch(e) {}
    })();
  </script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Viv's blog{% endblock title %}</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="human-json" href="/human.json">
  <link rel="alternate" type="application/rss+xml" title="Viv's blog RSS" href="/rss.xml">
  <meta property="og:site_name" content="Viv's blog">
  {% block head %}{% endblock head %}
</head>

<body>
  <header class="site-header">
    <a href="/" id="site-title">viv's blog</a>
    <nav>
      <a href="/about/">About/Contact</a>
      <a href="/ai/">AI Declaration</a>
      <button id="theme-toggle" type="button" aria-label="Toggle color scheme"></button>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock content %}
  </main>
  <footer class="site-footer">
    Blog content &copy; 2026 Viv, licensed under <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/">CC BY-NC-ND 4.0</a>.

    <nav>
      <a href="/privacy/">Privacy Policy</a>
      <a href="/rss.xml">RSS feed</a>
      <a href="https://github.com/vivax3794/vivax.dev">Source Code</a>
    </nav>
  </footer>
  <script>
    (function() {
      var btn = document.getElementById('theme-toggle');
      var sunIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
      var moonIcon = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

      function isDark() {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'dark' || t === 'light') return t === 'dark';
        } catch(e) {}
        return window.matchMedia("(prefers-color-scheme: dark)").matches;
      }

      function apply(dark) {
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        try { localStorage.setItem('theme', dark ? 'dark' : 'light'); } catch(e) {}
        btn.innerHTML = dark ? moonIcon : sunIcon;
        btn.setAttribute('aria-label', dark ? 'Switch to light theme' : 'Switch to dark theme');
      }

      btn.addEventListener('click', function() { apply(!isDark()); });
      apply(isDark());
    })();
  </script>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    function isDark() {
      const t = document.documentElement.getAttribute('data-theme');
      if (t === 'dark') return true;
      if (t === 'light') return false;
      return window.matchMedia("(prefers-color-scheme: dark)").matches;
    }

    const themes = {
      light: {
        theme: "base",
        themeVariables: {
          background: "#fafaf9",
          primaryColor: "#e8e5fc",
          primaryTextColor: "#1c1917",
          primaryBorderColor: "#4f46e5",
          secondaryColor: "#f5f5f4",
          secondaryTextColor: "#1c1917",
          secondaryBorderColor: "#e7e5e4",
          tertiaryColor: "#f5f5f4",
          tertiaryTextColor: "#1c1917",
          tertiaryBorderColor: "#e7e5e4",
          lineColor: "#78716c",
          textColor: "#1c1917",
          mainBkg: "#e8e5fc",
          nodeBorder: "#4f46e5",
          clusterBkg: "#f5f5f4",
          clusterBorder: "#e7e5e4",
          titleColor: "#1c1917",
          edgeLabelBackground: "#fafaf9",
        },
      },
      dark: {
        theme: "base",
        themeVariables: {
          background: "#1e1e2e",
          primaryColor: "#2a2b4a",
          primaryTextColor: "#cdd6f4",
          primaryBorderColor: "#89b4fa",
          secondaryColor: "#313244",
          secondaryTextColor: "#cdd6f4",
          secondaryBorderColor: "#45475a",
          tertiaryColor: "#313244",
          tertiaryTextColor: "#cdd6f4",
          tertiaryBorderColor: "#45475a",
          lineColor: "#a6adc8",
          textColor: "#cdd6f4",
          mainBkg: "#2a2b4a",
          nodeBorder: "#89b4fa",
          clusterBkg: "#313244",
          clusterBorder: "#45475a",
          titleColor: "#cdd6f4",
          edgeLabelBackground: "#1e1e2e",
        },
      },
    };

    function mermaidConfig() {
      return { startOnLoad: false, ...themes[isDark() ? "dark" : "light"] };
    }

    document.querySelectorAll(".mermaid").forEach(el => {
      el.setAttribute("data-mermaid-src", el.textContent);
    });
    mermaid.initialize(mermaidConfig());
    await mermaid.run({ querySelector: ".mermaid" });

    async function rerenderMermaid() {
      mermaid.initialize(mermaidConfig());
      const els = document.querySelectorAll(".mermaid");
      for (let i = 0; i < els.length; i++) {
        const el = els[i];
        const src = el.getAttribute("data-mermaid-src");
        const { svg } = await mermaid.render(`mermaid-rerender-${i}`, src);
        el.innerHTML = svg;
      }
    }

    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", rerenderMermaid);
    new MutationObserver(rerenderMermaid).observe(
      document.documentElement,
      { attributes: true, attributeFilter: ['data-theme'] }
    );
  </script>
</body>

</html>
